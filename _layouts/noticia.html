---
layout: default
---
<article style="max-width:800px;margin:8rem auto 4rem;padding:0 5%;">
  <a href="{{ site.baseurl }}/#noticias" style="color:var(--mid);font-size:.9rem;text-decoration:none;">← Volver a Noticias</a>
  <div style="margin-top:2rem;">
    <span class="news-tag">{{ page.categoria }}</span>
    <h1 style="font-family:'Playfair Display',serif;color:var(--navy);font-size:2.2rem;margin:.8rem 0;">{{ page.titulo }}</h1>
    <p style="color:var(--muted);font-size:.9rem;margin-bottom:2rem;">📅 {{ page.fecha }}</p>
    {% if page.imagen %}
    <img src="{{ site.baseurl }}{{ page.imagen }}" alt="{{ page.titulo }}" style="width:100%;border-radius:8px;margin-bottom:2rem;"/>
    {% endif %}
    <div style="font-size:1rem;line-height:1.9;color:var(--text);">
      {{ content }}
    </div>
  </div>
</article>
