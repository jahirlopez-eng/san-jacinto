<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ site.description }}"/>
<meta name="keywords" content="Unidad Educativa San Jacinto, escuela 24 de Mayo Manabí, colegio Sixto Durán Ballén, educación fiscal Manabí, bachillerato Manabí Ecuador, AMIE 13H03824"/>
<meta name="author" content="{{ site.institucion.nombre }}"/>
<meta name="robots" content="index, follow"/>
<meta name="geo.region" content="EC-M"/>
<meta name="geo.placename" content="24 de Mayo, Manabí, Ecuador"/>
<meta property="og:type" content="website"/>
<meta property="og:title" content="{{ site.title }}"/>
<meta property="og:description" content="{{ site.description }}"/>
<meta property="og:url" content="{{ site.url }}{{ site.baseurl }}"/>
<meta property="og:locale" content="es_EC"/>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "School",
  "name": "{{ site.institucion.nombre }}",
  "description": "{{ site.description }}",
  "url": "{{ site.url }}{{ site.baseurl }}",
  "foundingDate": "1993-08-13",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "Parroquia Sixto Durán Ballén",
    "addressLocality": "24 de Mayo",
    "addressRegion": "Manabí",
    "addressCountry": "EC"
  },
  "identifier": { "@type": "PropertyValue", "name": "AMIE", "value": "{{ site.institucion.amie }}" }
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css"/>
</head>
<body>

{% include nav.html %}

{{ content }}

{% include footer.html %}

<script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>
</html>
